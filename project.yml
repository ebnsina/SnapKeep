# Product name lives here once. Rename the target key + PRODUCT_BUNDLE_IDENTIFIER
# below and the .app, scheme, and Info.plist ($(PRODUCT_NAME)) all follow.
name: SnapKeep
options:
  bundleIdPrefix: me.ebnsina
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    ENABLE_HARDENED_RUNTIME: YES
    ARCHS: arm64
targets:
  SnapKeep:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.ebnsina.SnapKeep
        INFOPLIST_FILE: Sources/App/Info.plist
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
