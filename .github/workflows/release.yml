name: Release

# Cut a GitHub Release with a .dmg whenever a v* tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build DMG
        run: ./scripts/make-dmg.sh

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent: replace any existing release for this tag so re-cuts are clean.
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" build/SnapKeep-*.dmg \
            --title "SnapKeep ${{ github.ref_name }}" \
            --generate-notes
